[pytest]
# ── Test discovery ────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── asyncio mode ──────────────────────────────────────────────────────────────
asyncio_mode = auto

# ── Coverage defaults (run with: pytest --cov) ────────────────────────────────
addopts =
    --tb=short
    --strict-markers
    -q

# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    slow: marks tests as slow (skipped in fast CI runs with -m "not slow")
    integration: marks tests that require live infrastructure (Redis, DB)
    unit: marks pure unit tests with no external dependencies

# ── Logging ───────────────────────────────────────────────────────────────────
log_cli = true
log_cli_level = WARNING
log_level = WARNING

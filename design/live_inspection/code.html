<script>
        // Subtle magnetic effect for the capture button
        const captureBtn = document.querySelector('.relative.group');
        document.addEventListener('mousemove', (e) => {
            if (!captureBtn) return;
            const rect = captureBtn.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            
            const distance = Math.sqrt(x*x + y*y);
            if (distance < 150) {
                captureBtn.style.transform = `translate(${x * 0.15}px, ${y * 0.15}px)`;
            } else {
                captureBtn.style.transform = `translate(0, 0)`;
            }
        });

        // Toggle state for interaction simulation
        let isCapturing = false;
        const mainBtn = document.querySelector('button.relative');
        mainBtn.addEventListener('click', () => {
            isCapturing = true;
            mainBtn.style.transform = 'scale(0.8)';
            setTimeout(() => {
                mainBtn.style.transform = 'scale(1)';
                isCapturing = false;
            }, 200);
        });
    </script>

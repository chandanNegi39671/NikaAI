<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Animated Counters
            const counters = document.querySelectorAll('.animate-count');
            counters.forEach(counter => {
                const target = parseFloat(counter.getAttribute('data-target'));
                const suffix = counter.getAttribute('data-suffix') || '';
                let count = 0;
                const duration = 2000;
                const increment = target / (duration / 16);

                const updateCount = () => {
                    count += increment;
                    if (count < target) {
                        counter.innerText = (target % 1 === 0 ? Math.floor(count) : count.toFixed(1)) + suffix;
                        requestAnimationFrame(updateCount);
                    } else {
                        counter.innerText = target + suffix;
                    }
                };
                updateCount();
            });

            // Trigger confidence bar animation
            setTimeout(() => {
                const bar = document.getElementById('confidence-bar');
                if(bar) bar.style.width = '98.4%';
            }, 300);

            // Spotlight / Copper Glow Interaction
            const copperGlow = document.querySelector('.copper-glow');
            const parallaxBg = document.getElementById('parallax-bg');
            
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth) * 100;
                const y = (e.clientY / window.innerHeight) * 100;
                
                if (copperGlow) {
                    copperGlow.style.setProperty('--mouse-x', `${x}%`);
                    copperGlow.style.setProperty('--mouse-y', `${y}%`);
                }

                // Subtle background parallax depth effect
                if (parallaxBg) {
                    const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
                    const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
                    parallaxBg.style.transform = `translate(${moveX}px, ${moveY}px) scale(1.1)`;
                }
            });

            // Tilt card interaction
            const tiltCards = document.querySelectorAll('.tilt-card');
            tiltCards.forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = (y - centerY) / 4;
                    const rotateY = (centerX - x) / 4;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)`;
                });
            });
        });

        // Capture button click effect
        const mainBtn = document.querySelector('button.relative');
        if(mainBtn) {
            mainBtn.addEventListener('click', () => {
                mainBtn.style.transform = 'scale(0.85)';
                setTimeout(() => {
                    mainBtn.style.transform = 'scale(1)';
                }, 150);
            });
        }
    </script>

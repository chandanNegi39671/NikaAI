<script>
        // Animated Counters
        document.addEventListener('DOMContentLoaded', () => {
            const counters = document.querySelectorAll('.animate-count');
            counters.forEach(counter => {
                const target = parseFloat(counter.getAttribute('data-target'));
                const suffix = counter.getAttribute('data-suffix') || (counter.innerText.includes('%') ? '%' : '');
                let count = 0;
                const duration = 1500;
                const increment = target / (duration / 16);

                const updateCount = () => {
                    count += increment;
                    if (count < target) {
                        counter.innerText = (target % 1 === 0 ? Math.floor(count) : count.toFixed(1)) + suffix;
                        requestAnimationFrame(updateCount);
                    } else {
                        counter.innerText = target + suffix;
                    }
                };
                updateCount();
            });

            // Trigger confidence bar animation
            setTimeout(() => {
                const bar = document.getElementById('confidence-bar');
                if(bar) bar.style.width = '98.4%';
            }, 100);
        });

        // Magnetic effect for capture button
        const captureBtnGroup = document.querySelector('.relative.group');
        document.addEventListener('mousemove', (e) => {
            if (!captureBtnGroup) return;
            const rect = captureBtnGroup.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            
            const distance = Math.sqrt(x*x + y*y);
            if (distance < 150) {
                captureBtnGroup.style.transform = `translate(${x * 0.15}px, ${y * 0.15}px)`;
            } else {
                captureBtnGroup.style.transform = `translate(0, 0)`;
            }
        });

        // Side buttons 3D hover effects (handled by CSS tilt-card, but adding dynamic variance)
        const tiltCards = document.querySelectorAll('.tilt-card');
        tiltCards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (y - centerY) / 5;
                const rotateY = (centerX - x) / 5;
                card.style.transform = `translateY(-5px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = `translateY(0) rotateX(0) rotateY(0)`;
            });
        });

        // Click interaction
        const mainBtn = document.querySelector('button.relative');
        mainBtn.addEventListener('click', () => {
            mainBtn.style.transform = 'scale(0.85)';
            setTimeout(() => {
                mainBtn.style.transform = 'scale(1)';
            }, 200);
        });
    </script>

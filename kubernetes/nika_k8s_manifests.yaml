---
# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: nika-ai

---
# ── Secrets (base64 placeholders — replace with your vault-injected values) ───
# Generate values with: echo -n 'your_value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: nika-secrets
  namespace: nika-ai
type: Opaque
data:
  # IMPORTANT: Replace these with real base64-encoded secrets before deploying.
  # Never commit real secrets here. Use external-secrets-operator or Vault in production.
  SECRET_KEY: UkVQTEFDRV9XSVRIX0FfU0VDVVJFX0tFWV9BVF9MRUFTVF8zMl9DSEFSU19MT05H  # placeholder
  POSTGRES_PASSWORD: Y2hhbmdlbWVfaW5fcHJvZA==                                         # placeholder
  DATABASE_URL: cG9zdGdyZXNxbDovL25pa2FfdXNlcjpjaGFuZ2VtZV9pbl9wcm9kQG5pa2EtZGItc2VydmljZTo1NDMyL25pa2FfZGI=  # placeholder

---
# ── ConfigMap (non-secret runtime config) ─────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: nika-config
  namespace: nika-ai
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  MODEL_PATH: "/app/app/models/best.pt"
  REDIS_URL: "redis://nika-redis-service:6379/0"
  CELERY_BROKER_URL: "redis://nika-redis-service:6379/1"
  CELERY_RESULT_BACKEND: "redis://nika-redis-service:6379/2"

---
# ── PersistentVolumeClaim for uploads ─────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nika-uploads-pvc
  namespace: nika-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
# ── Backend Deployment ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nika-backend
  namespace: nika-ai
  labels:
    app: nika-backend
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nika-backend
  template:
    metadata:
      labels:
        app: nika-backend
        version: v1
    spec:
      # Security: do not automount the service account token unless needed
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: nika-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          # Resource limits prevent a single pod from starving the node
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"   # Increased from 512Mi — torch+ultralytics+opencv can hit 1.5GB
            limits:
              cpu: "1000m"
              memory: "3Gi"   # Increased from 2Gi — gives headroom above OOM threshold
          envFrom:
            - configMapRef:
                name: nika-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nika-secrets
                  key: SECRET_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nika-secrets
                  key: DATABASE_URL
          volumeMounts:
            - name: uploads-volume
              mountPath: /app/static/uploads
          # Container security context — drop all Linux capabilities
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # logs/uploads need writes
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 3
      volumes:
        - name: uploads-volume
          persistentVolumeClaim:
            claimName: nika-uploads-pvc

---
# ── Backend Service ───────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: nika-backend-service
  namespace: nika-ai
spec:
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app: nika-backend

---
# ── Celery Worker Deployment ──────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nika-celery-worker
  namespace: nika-ai
  labels:
    app: nika-celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nika-celery-worker
  template:
    metadata:
      labels:
        app: nika-celery-worker
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: celery-worker
          image: nika-backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - app.core.celery_app.celery_app
            - worker
            - --loglevel=info
            - --concurrency=2
            - -Q
            - default
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          envFrom:
            - configMapRef:
                name: nika-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nika-secrets
                  key: SECRET_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nika-secrets
                  key: DATABASE_URL
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

---
# ── Redis Deployment ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nika-redis
  namespace: nika-ai
  labels:
    app: nika-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nika-redis
  template:
    metadata:
      labels:
        app: nika-redis
    spec:
      automountServiceAccountToken: false
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20

---
# ── Redis Service ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: nika-redis-service
  namespace: nika-ai
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: nika-redis

---
# ── Frontend Deployment ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nika-frontend
  namespace: nika-ai
  labels:
    app: nika-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nika-frontend
  template:
    metadata:
      labels:
        app: nika-frontend
    spec:
      automountServiceAccountToken: false
      containers:
        - name: frontend
          image: nika-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

---
# ── Frontend Service ──────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: nika-frontend-service
  namespace: nika-ai
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: nika-frontend

---
# ── Ingress with TLS redirect ─────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nika-ingress
  namespace: nika-ai
  annotations:
    # Force HTTPS in production
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: nika-backend-service
                port:
                  number: 8000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: nika-backend-service
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nika-frontend-service
                port:
                  number: 80

---
# ── Horizontal Pod Autoscaler (Backend) ───────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nika-backend-hpa
  namespace: nika-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nika-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
